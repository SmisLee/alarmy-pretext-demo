<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Alarmy pretext demo: draggable analog clock, live multi-column text flow, and zero DOM measurements.">
  <title>Alarmy — The Editorial Engine</title>
  <style>
    * { box-sizing: border-box; margin: 0; }
    html, body {
      background: radial-gradient(ellipse at 50% 40%, #0f0f14 0%, #0a0a0c 100%);
      color: #e8e4dc; height: 100vh; overflow: hidden;
    }
    body {
      font-family: "Iowan Old Style", "Palatino Linotype", "Apple SD Gothic Neo",
                   "Noto Serif KR", "Book Antiqua", Palatino, serif;
    }

    #stage { position: relative; width: 100vw; height: 100vh; overflow: hidden; }

    .line {
      position: absolute; white-space: pre; z-index: 1; color: #e8e4dc;
      user-select: text; -webkit-user-select: text;
    }

    .headline-line {
      position: absolute; white-space: pre;
      font-weight: 700; color: #fff; letter-spacing: -0.5px; z-index: 2;
      user-select: text; -webkit-user-select: text;
    }

    .drop-cap {
      position: absolute; pointer-events: none; z-index: 2;
      font-weight: 700; color: #FC314C;
    }

    .clock-canvas {
      position: absolute; z-index: 10;
      cursor: grab; pointer-events: auto;
    }

    .pullquote-box {
      position: absolute; pointer-events: none; z-index: 3;
      border-left: 3px solid #FC314C; padding-left: 14px;
    }

    .pullquote-line {
      position: absolute; white-space: pre;
      font-style: italic; color: #FC6D80;
      user-select: text; -webkit-user-select: text;
    }

    .hint {
      position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
      font: 400 13px/1 "Helvetica Neue", Helvetica, Arial, sans-serif;
      color: rgba(255,255,255,0.22); z-index: 100;
      background: rgba(0,0,0,0.45); padding: 8px 18px; border-radius: 999px;
      pointer-events: none; white-space: nowrap;
    }

    .credit {
      position: fixed; right: 16px; bottom: 12px; z-index: 100;
      font: 400 11px/1 "Helvetica Neue", Helvetica, Arial, sans-serif;
      color: rgba(255,255,255,0.28); text-decoration: none;
    }
    .credit:hover { color: rgba(255,255,255,0.44); }

    @media (max-width: 760px) {
      .hint { display: none; }
      .credit { display: none; }
    }
  </style>
</head>
<body>
  <div id="stage"></div>
  <div class="hint">시계를 드래그해보세요 &middot; 모든 레이아웃은 JS</div>
  <a class="credit" href="https://github.com/chenglou/pretext" target="_blank" rel="noreferrer">Powered by pretext · Alarmy by Delightroom</a>
  <script type="module" src="./dist/main.js"></script>
</body>
</html>
